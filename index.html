<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>让小猫帮你决定</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="shell">
      <header class="brand">
        <h1 class="title">
          <span class="paw" aria-hidden="true">🐾</span>
          让小猫帮你决定
        </h1>
        <p class="subtitle">把你的纠结告诉小猫，它会帮你做出选择。</p>
      </header>

      <textarea
        id="confusionInput"
        rows="4"
        placeholder="写下你的纠结，比如：我要不要选A还是选B？"
        aria-label="输入你的纠结"
      ></textarea>

      <button id="tryBtn" type="button">让小猫看看</button>
      <p id="status" class="status" aria-live="polite" role="status"></p>

      <section id="resultArea" class="result-area" hidden>
        <div class="result-grid">
          <article class="card">
            <h3 class="card-title">这边的理由</h3>
            <div id="reasonA" class="card-content"></div>
          </article>

          <article class="card">
            <h3 class="card-title">那边的理由</h3>
            <div id="reasonB" class="card-content"></div>
          </article>

          <article class="card span-all">
            <h3 class="card-title">小猫的偏向</h3>
            <div id="leaning" class="card-content"></div>
          </article>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
